<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — Saxon Math Quiz</title>
    <link rel="stylesheet" th:href="@{/css/quiz.css}"/>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body class="auth-body">

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">📐</span>
            <h1>Saxon Math</h1>
            <p>Course 2 — Sign in to continue</p>
        </div>

        <div class="auth-alert auth-alert-success" th:if="${param.registered}">
            Account created! Please sign in.
        </div>
        <div class="auth-alert auth-alert-success" th:if="${param.logout}">
            You have been signed out.
        </div>
        <div class="auth-alert auth-alert-error" th:if="${param.error}">
            Invalid username or password.
        </div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus
                       placeholder="Enter your username"/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required
                       placeholder="Enter your password"/>
            </div>
            <button type="submit" class="auth-btn">Sign In</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a th:href="@{/signup}">Sign up</a></p>
        </div>
    </div>
</div>

</body>
</html>
