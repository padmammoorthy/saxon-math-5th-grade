# Production profile (Render with PostgreSQL)
# Render provides DATABASE_URL as postgres://user:pass@host:port/dbname
# Spring Boot needs jdbc:postgresql://host:port/dbname with separate user/pass

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false

server.port=${PORT:8080}
