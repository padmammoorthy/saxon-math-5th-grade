spring.application.name=math-quiz

# Default: H2 file-based for local development
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/mathquizdb}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console (local dev only)
spring.h2.console.enabled=${H2_CONSOLE:true}
spring.h2.console.path=/h2-console

server.port=${PORT:8080}
