# Render Blueprint — deploy with one click
services:
  - type: web
    name: saxon-math-quiz
    runtime: docker
    repo: https://github.com/padmammoorthy/saxon-math-5th-grade
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: saxon-math-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: saxon-math-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: saxon-math-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: saxon-math-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: saxon-math-db
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: "8080"

databases:
  - name: saxon-math-db
    plan: free
    databaseName: saxonmath
    user: saxonmath
