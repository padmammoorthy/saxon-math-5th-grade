# Render Blueprint — deploy with one click
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: saxon-math-quiz
    runtime: docker
    repo: https://github.com/padmammoorthy/saxon-math-5th-grade
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saxon-math-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: saxon-math-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: saxon-math-db
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: "8080"

databases:
  - name: saxon-math-db
    plan: free
    databaseName: saxonmath
    user: saxonmath
